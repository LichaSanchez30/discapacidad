<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Calculadora de sesiones</h1>
        <div class="calculadora">
        <div class="fechas">
            <label for="">Fecha desde:</label>
            <input id="fechaDesde" type="date" placeholder="Ej: 01/01/2025">
        </div>
        <div class=" fechas">
            <label for="">Fecha hasta:</label>
            <input id="fechaHasta" type="date" placeholder="Ej: 31/12/2025">
        </div >
        <div    class="sesiones">
        <label for="">Cant. sesiones:</label>
        <input type="number" name="" id="sesiones" placeholder="Ej: 2">
        </div>
        <button id="btn-caculador">Calcular</button>
        </div>
        <p id="totalDeSesiones"></p>
    </main>

    <script src="main.js"></script>
</body>
</html>
